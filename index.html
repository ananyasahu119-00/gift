<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>For My Love</title>
    <style> 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; color: white; font-family: 'Georgia', serif; }
        #game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        img { max-height: 70vh; margin-bottom: 20px; transition: 0.5s; border-radius: 10px; }
        .btn-container { position: relative; width: 300px; height: 100px; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        #yes-btn { background-color: #4a0404; color: white; }
        #no-btn { background-color: #333; color: #888; position: absolute; left: 160px; }
        .hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .heart { position: absolute; font-size: 2rem; animation: float 3s linear infinite; }
        @keyframes float { 0% { transform: translateY(110vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <h2 id="dialogue">Would you like to come with me?</h2>
    <img id="yoruichi-img" src="2a33b1550159df04b0c6032540601535.jpg">
    <div class="btn-container">
        <button id="yes-btn" onclick="nextStep()">Yes</button>
        <button id="no-btn" onmouseover="moveNo()" onclick="moveNo()">No</button>
    </div>
</div>

<div class="hearts" id="heart-box"></div>

<script>
    let step = 1;
    function moveNo() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        const btn = document.getElementById('no-btn');
        btn.style.position = 'fixed'; btn.style.left = x + 'px'; btn.style.top = y + 'px';
    }
    function nextStep() {
        if (step === 1) {
            document.getElementById('dialogue').innerText = "Ooh I see... so you finally came here.";
            document.getElementById('yoruichi-img').src = "5e9f575d361167442c67639094b9af63.jpg";
            step = 2;
            setTimeout(() => { 
                document.getElementById('dialogue').innerText = "Would you like to become mine again?"; 
            }, 2000);
        } else {
            document.body.style.backgroundColor = "white"; 
            document.body.style.color = "black";
            document.getElementById('dialogue').innerText = "Now you are with me... I love you sooo much and you are my babyy. I will never hurt you again! *Kiss*";
            document.getElementById('yoruichi-img').src = "0889fcd0943d4727191617b1fb0be7d6.jpg";
            document.getElementById('no-btn').style.display = "none";
            document.getElementById('yes-btn').style.display = "none";
            document.getElementById('heart-box').style.display = "block";
            setInterval(() => {
                const heart = document.createElement('div'); heart.className = 'heart'; heart.innerText = "❤️";
                heart.style.left = Math.random() * 100 + "vw"; document.getElementById('heart-box').appendChild(heart);
                setTimeout(() => heart.remove(), 3000);
            }, 200);
        }
    }
</script>
</body>
</html>
